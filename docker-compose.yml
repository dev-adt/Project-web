version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: landing-postgres
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME:-landing_db}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres_password}
    ports:
      - "${DB_PORT_HOST:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - landing_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-landing_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: landing-redis
    restart: always
    ports:
      - "${REDIS_PORT_HOST:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - landing_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: landing-minio
    restart: always
    ports:
      - "${MINIO_PORT_HOST:-9000}:9000"
      - "${MINIO_CONSOLE_PORT_HOST:-9001}:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minio_secret_key}
    volumes:
      - minio_data:/data
    networks:
      - landing_network
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:RELEASE.2024-04-18T16-58-47Z
    container_name: landing-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      /usr/bin/mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minio_admin} $${MINIO_ROOT_PASSWORD:-minio_secret_key};
      /usr/bin/mc mb -p local/$${MINIO_BUCKET_MEDIA:-media};
      /usr/bin/mc mb -p local/$${MINIO_BUCKET_UPLOADS:-uploads};
      /usr/bin/mc mb -p local/$${MINIO_BUCKET_EXPORTS:-exports};
      /usr/bin/mc mb -p local/$${MINIO_BUCKET_BACKUPS:-backups};
      /usr/bin/mc anonymous set public local/$${MINIO_BUCKET_MEDIA:-media};
      exit 0;
      "
    networks:
      - landing_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: landing-backend
    restart: always
    ports:
      - "${BACKEND_PORT_HOST:-4000}:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres_password}@postgres:5432/${DB_NAME:-landing_db}?schema=public
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio_admin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio_secret_key}
      JWT_SECRET: ${JWT_SECRET:-super_secret_key_change_me_in_prod}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-super_secret_refresh_key_change_me_in_prod}
      JWT_EXPIRATION: ${JWT_EXPIRATION:-3600s}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-604800s}
    volumes:
      - ./backend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - landing_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: landing-frontend
    restart: always
    ports:
      - "${FRONTEND_PORT_HOST:-3000}:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_URL: http://localhost/api/v1
      NEXT_PUBLIC_APP_URL: http://localhost
    volumes:
      - ./frontend:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - backend
    networks:
      - landing_network

  nginx:
    image: nginx:stable-alpine
    container_name: landing-nginx
    restart: always
    ports:
      - "${NGINX_PORT_HOST:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
    networks:
      - landing_network

networks:
  landing_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
